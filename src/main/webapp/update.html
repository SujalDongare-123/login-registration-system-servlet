<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update User</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

	<nav class="navbar navbar-dark px-4">

		<span class="navbar-brand"> Update User </span>

	</nav>

	<div class="container mt-5">

		<div class="card p-4">

			<h3 class="text-center title mb-4">Update User Details</h3>

			<form action="update" method="post">

				<div class="mb-3">

					<label>ID</label> <input type="number" name="id" id="id"
						class="form-control" readonly>

				</div>

				<div class="mb-3">

					<label>Name</label> <input type="text" name="name" id="name"
						class="form-control" required>

				</div>

				<div class="mb-3">

					<label>Email</label> <input type="email" name="email" id="email"
						class="form-control" required>

				</div>

				<div class="mb-4">

					<label>Password</label> <input type="text" name="password"
						id="password" class="form-control" required>

				</div>

				<button class="btn btn-warning w-100">Update User</button>

				<a href="view" class="btn btn-secondary w-100 mt-3"> ⬅ Back to
					Users </a>

			</form>

		</div>

	</div>

	<script>
		const params = new URLSearchParams(window.location.search);

		document.getElementById("id").value = params.get("id");

		document.getElementById("name").value = params.get("name");

		document.getElementById("email").value = params.get("email");

		document.getElementById("password").value = params.get("password");
	</script>

</body>
</html>
